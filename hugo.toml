baseURL = 'https://robert-xblog.art'
languageCode = 'zh-CN'
title = 'Robert | 程序员 · 生活家'
theme = 'PaperMod'

# 忽略 Obsidian / Copilot / Excalidraw / textgenerator 提示词等内容
# 使用包含式正则，匹配任意路径中的这些目录名
ignoreFiles = [
  'copilot/',
  'Excalidraw/',
  'textgenerator/',
  '\\.obsidian/',
  'private/',
]

[params]
  author = 'Robert'
  description = '80后程序员，北邮本硕，信息与计算机专业。在代码与诗意之间寻找平衡。'
  keywords = ['Robert', '程序员', '博客', 'AI', '技术']
  math = true
  defaultTheme = 'light'
  disableThemeToggle = false
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = false
  ShowCodeCopyButtons = true
  ShowWordCount = true
  ShowRssButtonInSectionTermList = false
  UseHugoToc = true
  disableSpecial1stPost = false
  disableScrollToTop = false
  comments = false
  hidemeta = false
  hideSummary = false
  showtoc = false
  tocopen = false
  
  # 禁用个人资料模式，使用首页信息模式（显示最近文章）
  [params.profileMode]
    enabled = false

  # 首页信息
  [params.homeInfoParams]
    Title = "Robert"
    Content = "80后程序员 · 北邮本硕 · 信息与计算机专业"
  
  # Fix for deprecated .Site.Social
  [params.social]
    disabled = true
  
  # 首页显示文章的主要栏目
  mainSections = ["tech"]

[menu]
  [[menu.main]]
    identifier = "tech"
    name = "💻 专业"
    url = "/tech/"
    weight = 10
  [[menu.main]]
    identifier = "life"
    name = "🍃 人生"
    url = "/life/"
    weight = 20
  [[menu.main]]
    identifier = "music"
    name = "🎵 兴趣"
    url = "/music/"
    weight = 30
  [[menu.main]]
    identifier = "literature"
    name = "📜 文学"
    url = "/literature/"
    weight = 40

[markup]
  [markup.highlight]
    noClasses = false
    anchorLineNos = false
    codeFences = true
    guessSyntax = true
    hl_Lines = ""
    hl_inline = false
    lineAnchors = ""
    lineNoStart = 1
    lineNos = false
    lineNumbersInTable = true
    tabWidth = 4
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

# Fix for deprecated .Site.Social
[social]
  twitter = ""
  facebook = ""
  linkedin = ""

[outputs]
  home = ["HTML", "RSS", "JSON"]
