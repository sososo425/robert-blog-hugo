{{- /* AI Chat Component for Blog Posts */ -}}
{{- if not (.Param "disableAIChat") -}}
<div id="ai-chat-widget" class="ai-chat-widget">
  <button id="ai-chat-toggle" class="ai-chat-toggle" aria-label="AI助手">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path>
      <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
      <line x1="12" y1="19" x2="12" y2="22"></line>
      <line x1="8" y1="22" x2="16" y2="22"></line>
    </svg>
    <span>AI助手</span>
  </button>

  <div id="ai-chat-window" class="ai-chat-window" style="display: none;">
    <div class="ai-chat-header">
      <div class="ai-chat-title">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
        </svg>
        <span>文章 AI 助手</span>
      </div>
      <div class="ai-chat-header-actions">
        <button id="ai-chat-expand" class="ai-chat-header-btn" aria-label="展开" title="展开窗口">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M8 3H5a2 2 0 0 0-2 2v3"></path>
            <path d="M21 8V5a2 2 0 0 0-2-2h-3"></path>
            <path d="M3 16v3a2 2 0 0 0 2 2h3"></path>
            <path d="M16 21h3a2 2 0 0 0 2-2v-3"></path>
          </svg>
        </button>
        <button id="ai-chat-close" class="ai-chat-header-btn" aria-label="关闭">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
    </div>

    <div class="ai-chat-suggestions">
      <button class="ai-chat-suggestion" data-prompt="这篇文章的核心观点是什么？">💡 总结核心观点</button>
      <button class="ai-chat-suggestion" data-prompt="请帮我解释文中的技术概念">🔍 解释技术概念</button>
      <button class="ai-chat-suggestion" data-prompt="这篇文章有哪些关键要点？">📝 提取关键要点</button>
    </div>

    <div id="ai-chat-messages" class="ai-chat-messages">
      <div class="ai-chat-message ai-chat-message-assistant">
        <div class="ai-chat-avatar">🤖</div>
        <div class="ai-chat-content">
          <p>你好！我是这篇文章的 AI 助手。你可以问我关于本文内容的任何问题，我会基于文章内容为你解答。</p>
        </div>
      </div>
    </div>

    <div class="ai-chat-input-area">
      <textarea
        id="ai-chat-input"
        class="ai-chat-input"
        placeholder="输入你的问题..."
        rows="2"
      ></textarea>
      <button id="ai-chat-send" class="ai-chat-send" aria-label="发送">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
    <div class="ai-chat-footer">
      <span>Powered by Kimi k2.5</span>
      <span id="ai-chat-token-info" class="ai-chat-token-info"></span>
    </div>
  </div>
</div>

<style>
.ai-chat-widget {
  position: fixed;
  bottom: 20px;
  right: 20px;
  z-index: 9999;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
}

.ai-chat-toggle {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 12px 20px;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white;
  border: none;
  border-radius: 50px;
  cursor: pointer;
  font-size: 14px;
  font-weight: 500;
  box-shadow: 0 4px 20px rgba(102, 126, 234, 0.4);
  transition: all 0.3s ease;
}

.ai-chat-toggle:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 25px rgba(102, 126, 234, 0.5);
}

.ai-chat-window {
  position: absolute;
  bottom: 70px;
  right: 0;
  width: 380px;
  max-width: calc(100vw - 40px);
  background: var(--theme, #fff);
  border-radius: 16px;
  box-shadow: 0 10px 50px rgba(0, 0, 0, 0.2);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  max-height: 600px;
  transition: all 0.3s ease;
}

.ai-chat-window.expanded {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 90vw;
  max-width: 900px;
  height: 85vh;
  max-height: 85vh;
  bottom: auto;
  right: auto;
}

.dark .ai-chat-window {
  background: #1a1a1a;
  border: 1px solid #333;
}

.ai-chat-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white;
}

.ai-chat-title {
  display: flex;
  align-items: center;
  gap: 10px;
  font-weight: 600;
  font-size: 15px;
}

.ai-chat-header-actions {
  display: flex;
  gap: 8px;
}

.ai-chat-header-btn {
  background: none;
  border: none;
  color: white;
  cursor: pointer;
  padding: 4px;
  border-radius: 4px;
  transition: background 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
}

.ai-chat-header-btn:hover {
  background: rgba(255, 255, 255, 0.2);
}

.ai-chat-suggestions {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  padding: 12px 16px;
  background: var(--theme, #f8f9fa);
  border-bottom: 1px solid var(--border, #e5e5e5);
}

.dark .ai-chat-suggestions {
  background: #242424;
  border-color: #333;
}

.ai-chat-suggestion {
  padding: 6px 12px;
  background: var(--theme, #fff);
  border: 1px solid var(--border, #e5e5e5);
  border-radius: 20px;
  cursor: pointer;
  font-size: 12px;
  color: var(--primary, #333);
  transition: all 0.2s;
}

.dark .ai-chat-suggestion {
  background: #1a1a1a;
  border-color: #444;
  color: #e0e0e0;
}

.ai-chat-suggestion:hover {
  border-color: #667eea;
  color: #667eea;
}

.ai-chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  max-height: 350px;
  background: var(--theme, #fff);
}

.ai-chat-window.expanded .ai-chat-messages {
  max-height: none;
}

.dark .ai-chat-messages {
  background: #1a1a1a;
}

.ai-chat-message {
  display: flex;
  gap: 12px;
  margin-bottom: 16px;
  animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.ai-chat-avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
  background: #f0f0f0;
}

.dark .ai-chat-avatar {
  background: #333;
}

.ai-chat-message-user .ai-chat-avatar {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
}

.ai-chat-content {
  flex: 1;
  background: var(--code-bg, #f5f5f5);
  padding: 12px 16px;
  border-radius: 12px;
  font-size: 14px;
  line-height: 1.6;
  color: var(--content, #333);
  overflow-wrap: break-word;
}

.dark .ai-chat-content {
  background: #2a2a2a;
  color: #e0e0e0;
}

.ai-chat-message-user .ai-chat-content {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white;
}

.ai-chat-content p {
  margin: 0 0 8px 0;
}

.ai-chat-content p:last-child {
  margin-bottom: 0;
}

.ai-chat-content pre {
  background: #1a1a2e;
  border-radius: 8px;
  padding: 12px;
  overflow-x: auto;
  margin: 8px 0;
  position: relative;
}

.ai-chat-content code {
  font-family: 'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace;
  font-size: 13px;
}

.ai-chat-content :not(pre) > code {
  background: rgba(102, 126, 234, 0.1);
  padding: 2px 6px;
  border-radius: 4px;
  color: #667eea;
}

.ai-chat-content pre code {
  color: #e0e0e0;
  background: none;
  padding: 0;
}

.code-block-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 6px 12px;
  background: #252542;
  border-radius: 8px 8px 0 0;
  font-size: 12px;
  color: #888;
  margin: -12px -12px 8px -12px;
}

.code-block-copy {
  background: none;
  border: 1px solid #444;
  color: #888;
  padding: 2px 8px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 11px;
  transition: all 0.2s;
}

.code-block-copy:hover {
  border-color: #667eea;
  color: #667eea;
}

.code-block-copy.copied {
  border-color: #4ade80;
  color: #4ade80;
}

.ai-chat-content ul, .ai-chat-content ol {
  margin: 8px 0;
  padding-left: 20px;
}

.ai-chat-content li {
  margin: 4px 0;
}

.ai-chat-content h1, .ai-chat-content h2, .ai-chat-content h3, .ai-chat-content h4 {
  margin: 16px 0 8px 0;
  font-weight: 600;
}

.ai-chat-content h1 { font-size: 18px; }
.ai-chat-content h2 { font-size: 16px; }
.ai-chat-content h3 { font-size: 15px; }
.ai-chat-content h4 { font-size: 14px; }

.ai-chat-content blockquote {
  border-left: 3px solid #667eea;
  padding-left: 12px;
  margin: 8px 0;
  color: #666;
}

.dark .ai-chat-content blockquote {
  color: #aaa;
}

.ai-chat-content table {
  width: 100%;
  border-collapse: collapse;
  margin: 8px 0;
  font-size: 13px;
}

.ai-chat-content th, .ai-chat-content td {
  border: 1px solid var(--border, #e5e5e5);
  padding: 8px 12px;
  text-align: left;
}

.dark .ai-chat-content th, .dark .ai-chat-content td {
  border-color: #444;
}

.ai-chat-content th {
  background: var(--code-bg, #f5f5f5);
  font-weight: 600;
}

.dark .ai-chat-content th {
  background: #333;
}

.ai-chat-input-area {
  display: flex;
  gap: 8px;
  padding: 12px 16px;
  background: var(--theme, #f8f9fa);
  border-top: 1px solid var(--border, #e5e5e5);
}

.dark .ai-chat-input-area {
  background: #242424;
  border-color: #333;
}

.ai-chat-input {
  flex: 1;
  padding: 10px 14px;
  border: 1px solid var(--border, #ddd);
  border-radius: 20px;
  resize: none;
  font-family: inherit;
  font-size: 14px;
  background: var(--theme, #fff);
  color: var(--content, #333);
  outline: none;
}

.dark .ai-chat-input {
  background: #1a1a1a;
  border-color: #444;
  color: #e0e0e0;
}

.ai-chat-input:focus {
  border-color: #667eea;
}

.ai-chat-send {
  width: 40px;
  height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white;
  border: none;
  border-radius: 50%;
  cursor: pointer;
  transition: all 0.2s;
}

.ai-chat-send:hover:not(:disabled) {
  transform: scale(1.05);
}

.ai-chat-send:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.ai-chat-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 16px;
  text-align: center;
  font-size: 11px;
  color: #999;
  background: var(--theme, #f8f9fa);
  border-top: 1px solid var(--border, #e5e5e5);
}

.dark .ai-chat-footer {
  background: #242424;
  border-color: #333;
  color: #666;
}

.ai-chat-token-info {
  font-size: 10px;
}

.ai-chat-loading {
  display: flex;
  align-items: center;
  gap: 4px;
}

.ai-chat-loading span {
  width: 8px;
  height: 8px;
  background: #667eea;
  border-radius: 50%;
  animation: bounce 1.4s infinite ease-in-out both;
}

.ai-chat-loading span:nth-child(1) { animation-delay: -0.32s; }
.ai-chat-loading span:nth-child(2) { animation-delay: -0.16s; }

@keyframes bounce {
  0%, 80%, 100% { transform: scale(0); }
  40% { transform: scale(1); }
}

.ai-chat-error {
  background: #fef2f2;
  border: 1px solid #fecaca;
  border-radius: 8px;
  padding: 12px;
  color: #dc2626;
  font-size: 13px;
}

.dark .ai-chat-error {
  background: #450a0a;
  border-color: #7f1d1d;
  color: #fca5a5;
}

.ai-chat-retry {
  background: #dc2626;
  color: white;
  border: none;
  padding: 4px 12px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 12px;
  margin-top: 8px;
}

.ai-chat-retry:hover {
  background: #b91c1c;
}

@media (max-width: 480px) {
  .ai-chat-widget {
    bottom: 10px;
    right: 10px;
  }

  .ai-chat-window {
    width: calc(100vw - 20px);
    right: -10px;
    bottom: 60px;
  }

  .ai-chat-window.expanded {
    width: 95vw;
    height: 80vh;
  }

  .ai-chat-toggle span {
    display: none;
  }

  .ai-chat-toggle {
    padding: 12px;
    border-radius: 50%;
  }
}
</style>

<!-- Load marked.js for Markdown parsing -->
<script src="https://cdn.jsdelivr.net/npm/marked@9.1.6/marked.min.js"></script>
<script>
(function() {
  // Wait for marked to load
  const waitForMarked = () => {
    return new Promise((resolve) => {
      if (typeof marked !== 'undefined') {
        resolve(marked);
        return;
      }
      const checkInterval = setInterval(() => {
        if (typeof marked !== 'undefined') {
          clearInterval(checkInterval);
          resolve(marked);
        }
      }, 100);
      // Timeout after 10 seconds
      setTimeout(() => {
        clearInterval(checkInterval);
        resolve(null);
      }, 10000);
    });
  };

  // Article content for context
  const articleTitle = {{ .Title | jsonify }};
  const articleContent = document.querySelector('.post-content')?.innerText?.substring(0, 6000) || '';
  const articleUrl = {{ .Permalink | jsonify }};

  // DOM elements
  const toggle = document.getElementById('ai-chat-toggle');
  const window_ = document.getElementById('ai-chat-window');
  const close = document.getElementById('ai-chat-close');
  const expand = document.getElementById('ai-chat-expand');
  const input = document.getElementById('ai-chat-input');
  const send = document.getElementById('ai-chat-send');
  const messages = document.getElementById('ai-chat-messages');
  const suggestions = document.querySelectorAll('.ai-chat-suggestion');
  const tokenInfo = document.getElementById('ai-chat-token-info');

  // State
  let isOpen = false;
  let isLoading = false;
  let isExpanded = false;
  let conversationId = null;
  let markedParser = null;

  // Initialize
  (async () => {
    markedParser = await waitForMarked();
    if (!markedParser) {
      console.warn('Marked.js failed to load, falling back to plain text');
    }
  })();

  // Generate or retrieve conversation ID
  const getConversationId = () => {
    if (!conversationId) {
      conversationId = crypto.randomUUID();
    }
    return conversationId;
  };

  // Toggle chat window
  toggle.addEventListener('click', () => {
    isOpen = !isOpen;
    window_.style.display = isOpen ? 'flex' : 'none';
    if (isOpen) {
      input.focus();
    }
  });

  close.addEventListener('click', () => {
    isOpen = false;
    window_.style.display = 'none';
  });

  // Expand/collapse window
  expand.addEventListener('click', () => {
    isExpanded = !isExpanded;
    window_.classList.toggle('expanded', isExpanded);

    // Update expand icon
    const svg = expand.querySelector('svg');
    if (isExpanded) {
      // Shrink icon
      svg.innerHTML = '<path d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3m0 18v-3a2 2 0 0 1 2-2h3M3 16h3a2 2 0 0 1 2 2v3"/>';
      expand.setAttribute('title', '缩小窗口');
    } else {
      // Expand icon
      svg.innerHTML = '<path d="M8 3H5a2 2 0 0 0-2 2v3"/><path d="M21 8V5a2 2 0 0 0-2-2h-3"/><path d="M3 16v3a2 2 0 0 0 2 2h3"/><path d="M16 21h3a2 2 0 0 0 2-2v-3"/>';
      expand.setAttribute('title', '展开窗口');
    }
  });

  // Suggestion buttons
  suggestions.forEach(btn => {
    btn.addEventListener('click', () => {
      const prompt = btn.dataset.prompt;
      input.value = prompt;
      sendMessage();
    });
  });

  // Send message
  send.addEventListener('click', sendMessage);
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  // Parse Markdown content
  function parseMarkdown(content) {
    if (!markedParser) {
      // Fallback: escape HTML and convert newlines to <br>
      return escapeHtml(content).replace(/\n/g, '<br>');
    }

    try {
      // Configure marked options
      markedParser.setOptions({
        breaks: true,
        gfm: true,
        headerIds: false,
        sanitize: false // We handle sanitization ourselves
      });

      let html = markedParser.parse(content);

      // Add copy buttons to code blocks
      html = html.replace(/<pre><code([^>]*)>([\s\S]*?)<\/code><\/pre>/g, (match, langAttr, code) => {
        const lang = langAttr.match(/class="language-([^"]+)"/)?.[1] || 'code';
        const escapedCode = escapeHtml(code.trim());
        return `<pre><div class="code-block-header"><span>${lang}</span><button class="code-block-copy" onclick="copyCode(this)">复制</button></div><code${langAttr}>${code}</code></pre>`;
      });

      return html;
    } catch (e) {
      console.error('Markdown parsing error:', e);
      return escapeHtml(content);
    }
  }

  // Copy code to clipboard
  window.copyCode = function(button) {
    const pre = button.closest('pre');
    const code = pre.querySelector('code');
    const text = code.textContent;

    navigator.clipboard.writeText(text).then(() => {
      button.textContent = '已复制!';
      button.classList.add('copied');
      setTimeout(() => {
        button.textContent = '复制';
        button.classList.remove('copied');
      }, 2000);
    }).catch(() => {
      button.textContent = '复制失败';
      setTimeout(() => {
        button.textContent = '复制';
      }, 2000);
    });
  };

  function addMessage(content, isUser = false, isError = false) {
    const messageDiv = document.createElement('div');
    messageDiv.className = `ai-chat-message ai-chat-message-${isUser ? 'user' : 'assistant'}`;

    if (isError) {
      messageDiv.innerHTML = `
        <div class="ai-chat-avatar">⚠️</div>
        <div class="ai-chat-content ai-chat-error">${content}</div>
      `;
    } else if (isUser) {
      messageDiv.innerHTML = `
        <div class="ai-chat-avatar">👤</div>
        <div class="ai-chat-content"><p>${escapeHtml(content)}</p></div>
      `;
    } else {
      // AI response with Markdown
      const parsedContent = parseMarkdown(content);
      messageDiv.innerHTML = `
        <div class="ai-chat-avatar">🤖</div>
        <div class="ai-chat-content">${parsedContent}</div>
      `;
    }

    messages.appendChild(messageDiv);
    messages.scrollTop = messages.scrollHeight;
  }

  function addLoading() {
    const loadingDiv = document.createElement('div');
    loadingDiv.className = 'ai-chat-message ai-chat-message-assistant';
    loadingDiv.id = 'ai-chat-loading';
    loadingDiv.innerHTML = `
      <div class="ai-chat-avatar">🤖</div>
      <div class="ai-chat-content">
        <div class="ai-chat-loading">
          <span></span>
          <span></span>
          <span></span>
        </div>
      </div>
    `;
    messages.appendChild(loadingDiv);
    messages.scrollTop = messages.scrollHeight;
  }

  function removeLoading() {
    const loading = document.getElementById('ai-chat-loading');
    if (loading) loading.remove();
  }

  function updateTokenInfo(usage) {
    if (!usage) {
      tokenInfo.textContent = '';
      return;
    }
    const prompt = usage.prompt_tokens || 0;
    const completion = usage.completion_tokens || 0;
    tokenInfo.textContent = `${prompt} + ${completion} tokens`;
  }

  async function sendMessage() {
    const text = input.value.trim();
    if (!text || isLoading) return;

    // Add user message
    addMessage(text, true);
    input.value = '';

    // Show loading
    isLoading = true;
    send.disabled = true;
    addLoading();

    try {
      const response = await fetch('/api/chat', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({
          message: text,
          articleTitle: articleTitle,
          articleContent: articleContent,
          articleUrl: articleUrl,
          conversationId: getConversationId()
        })
      });

      if (!response.ok) {
        throw new Error(`API request failed: ${response.status}`);
      }

      const data = await response.json();
      removeLoading();

      // Update token usage
      updateTokenInfo(data.usage);

      // Store conversation ID from response
      if (data.conversationId) {
        conversationId = data.conversationId;
      }

      if (data.choices && data.choices[0] && data.choices[0].message) {
        addMessage(data.choices[0].message.content);
      } else if (data.content) {
        addMessage(data.content);
      } else {
        addMessage('抱歉，我暂时无法回答，请稍后重试。', false, true);
      }
    } catch (error) {
      console.error('AI Chat Error:', error);
      removeLoading();
      addMessage(`
        <p>抱歉，服务暂时不可用。</p>
        <p>错误信息：${escapeHtml(error.message)}</p>
        <button class="ai-chat-retry" onclick="retryLastMessage()">重试</button>
      `, false, true);
    } finally {
      isLoading = false;
      send.disabled = false;
    }
  }

  // Retry last message
  window.retryLastMessage = function() {
    const errorMessage = messages.lastElementChild;
    if (errorMessage && errorMessage.querySelector('.ai-chat-error')) {
      errorMessage.remove();
      // Get last user message
      const userMessages = messages.querySelectorAll('.ai-chat-message-user');
      if (userMessages.length > 0) {
        const lastUserMessage = userMessages[userMessages.length - 1];
        const text = lastUserMessage.querySelector('.ai-chat-content').textContent;
        input.value = text;
        sendMessage();
      }
    }
  };

  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }
})();
</script>
{{- end -}}
