{{ define "main" }}
<style>
  .login-container {
    max-width: 400px;
    margin: 60px auto;
    padding: 30px;
    background: var(--theme);
    border-radius: 10px;
    box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
  }

  .login-form h1 {
    text-align: center;
    margin-bottom: 30px;
    color: var(--text-color);
  }

  .form-group {
    margin-bottom: 20px;
  }

  .form-group label {
    display: block;
    margin-bottom: 8px;
    color: var(--text-color);
    font-weight: 500;
  }

  .form-group input {
    width: 100%;
    padding: 12px;
    border: 1px solid var(--border-color);
    border-radius: 5px;
    background: var(--bg-color);
    color: var(--text-color);
    font-size: 16px;
    box-sizing: border-box;
  }

  .form-group input:focus {
    outline: none;
    border-color: var(--primary-color);
  }

  .login-btn {
    width: 100%;
    padding: 12px;
    background: var(--primary-color);
    color: white;
    border: none;
    border-radius: 5px;
    font-size: 16px;
    cursor: pointer;
    transition: background 0.3s;
  }

  .login-btn:hover {
    background: var(--primary-color-dark);
  }

  .login-btn:disabled {
    background: var(--border-color);
    cursor: not-allowed;
  }

  .error-message {
    background: #fee;
    color: #c00;
    padding: 10px;
    border-radius: 5px;
    margin-bottom: 20px;
    display: none;
  }

  .success-message {
    background: #efe;
    color: #0a0;
    padding: 10px;
    border-radius: 5px;
    margin-bottom: 20px;
    display: none;
  }

  .admin-panel-link {
    text-align: center;
    margin-top: 20px;
  }

  .admin-panel-link a {
    color: var(--primary-color);
    text-decoration: none;
  }

  .admin-panel-link a:hover {
    text-decoration: underline;
  }
</style>

<div class="login-container">
  <div class="login-form">
    <h1>🔐 管理员登录</h1>

    <div id="error-message" class="error-message"></div>
    <div id="success-message" class="success-message"></div>

    <form id="loginForm">
      <div class="form-group">
        <label for="username">用户名</label>
        <input
          type="text"
          id="username"
          name="username"
          required
          autocomplete="username"
          placeholder="请输入用户名"
        >
      </div>

      <div class="form-group">
        <label for="password">密码</label>
        <input
          type="password"
          id="password"
          name="password"
          required
          autocomplete="current-password"
          placeholder="请输入密码"
        >
      </div>

      <button type="submit" class="login-btn" id="loginBtn">登录</button>
    </form>

    <div class="admin-panel-link" id="adminPanelLink" style="display: none;">
      <p>✅ 登录成功！</p>
      <a href="/admin/">前往管理面板 →</a>
    </div>
  </div>
</div>

<script>
(function() {
  const loginForm = document.getElementById('loginForm');
  const errorMessage = document.getElementById('error-message');
  const successMessage = document.getElementById('success-message');
  const loginBtn = document.getElementById('loginBtn');
  const adminPanelLink = document.getElementById('adminPanelLink');

  const DEFAULT_USERNAME = 'admin';
  const DEFAULT_PASSWORD = 'admin123';

  function checkExistingSession() {
    const token = localStorage.getItem('adminToken');
    const expires = localStorage.getItem('tokenExpires');

    if (token && expires) {
      const now = Date.now();
      if (now < parseInt(expires)) {
        window.location.href = '/admin/';
        return;
      } else {
        localStorage.removeItem('adminToken');
        localStorage.removeItem('tokenExpires');
        localStorage.removeItem('adminUsername');
      }
    }
  }

  checkExistingSession();

  loginForm.addEventListener('submit', async (e) => {
    e.preventDefault();

    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;

    errorMessage.style.display = 'none';
    successMessage.style.display = 'none';

    loginBtn.disabled = true;
    loginBtn.textContent = '登录中...';

    await new Promise(resolve => setTimeout(resolve, 300));

    if (username === DEFAULT_USERNAME && password === DEFAULT_PASSWORD) {
      const token = 'frontend-token-' + Date.now();
      const expires = Date.now() + 24 * 60 * 60 * 1000;

      localStorage.setItem('adminToken', token);
      localStorage.setItem('tokenExpires', expires.toString());
      localStorage.setItem('adminUsername', username);

      successMessage.textContent = '✅ 登录成功！正在跳转...';
      successMessage.style.display = 'block';

      setTimeout(() => {
        window.location.href = '/admin/';
      }, 800);
    } else {
      errorMessage.textContent = '❌ 用户名或密码错误，请重试';
      errorMessage.style.display = 'block';
      loginBtn.disabled = false;
      loginBtn.textContent = '登录';
    }
  });
})();
</script>
{{ end }}
